apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent-runner
  labels:
    app: sahayakan
    component: agent-runner
spec:
  replicas: {{ .Values.agentRunner.replicas }}
  selector:
    matchLabels:
      app: sahayakan
      component: agent-runner
  template:
    metadata:
      labels:
        app: sahayakan
        component: agent-runner
    spec:
      terminationGracePeriodSeconds: 300
      containers:
        - name: agent-runner
          image: "{{ .Values.agentRunner.image.repository }}:{{ .Values.agentRunner.image.tag }}"
          env:
            - name: POSTGRES_HOST
              value: {{ .Release.Name }}-postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-secret
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
            - name: VERTEX_PROJECT
              value: {{ .Values.vertexai.project | quote }}
            - name: VERTEX_LOCATION
              value: {{ .Values.vertexai.location }}
            - name: KNOWLEDGE_CACHE_PATH
              value: /data/knowledge-cache
          resources:
            {{- toYaml .Values.agentRunner.resources | nindent 12 }}
          volumeMounts:
            - name: knowledge-cache
              mountPath: /data/knowledge-cache
      volumes:
        - name: knowledge-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-knowledge-cache
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-agent-runner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-agent-runner
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilization }}
{{- end }}
